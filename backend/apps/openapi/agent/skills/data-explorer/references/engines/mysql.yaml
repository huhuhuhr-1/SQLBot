engine: mysql
dialect_notes:
  casting: "CAST(column AS type) 或 CONVERT(column, type)"
  date_extract: "YEAR(col), MONTH(col), DAY(col), DATE_FORMAT(col, '%Y-%m')"
  date_math: "DATE_ADD(col, INTERVAL 1 DAY), DATEDIFF(d1, d2)"
  string_concat: "CONCAT(a, b) (|| 不支持)"
  limit: "LIMIT n OFFSET m (或 LIMIT m, n)"
  identifier_quote: "反引号 (`table_name`)"
  ilike: "不支持 ILIKE，用 LOWER(col) LIKE LOWER('%pattern%')"
  window_functions: "MySQL 8.0+ 支持 ROW_NUMBER(), RANK(), LAG(), LEAD()"
  cte: "MySQL 8.0+ 支持 WITH ... AS (...)"
  json: "JSON_EXTRACT(), ->>, JSON_UNQUOTE()"
common_patterns:
  top_n: |
    SELECT * FROM `table` ORDER BY metric DESC LIMIT 10
  year_over_year: |
    SELECT
      period,
      metric,
      LAG(metric) OVER (ORDER BY period) AS prev_metric
    FROM aggregated_data
