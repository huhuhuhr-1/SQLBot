apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sqlbot.fullname" . }}
  labels:
    {{- include "sqlbot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sqlbot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sqlbot.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: api
              containerPort: {{ .Values.service.apiPort }}
              protocol: TCP
            - name: mcp
              containerPort: {{ .Values.service.mcpPort }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "sqlbot.fullname" . }}-config
            - secretRef:
                name: {{ .Values.existingSecret | default (printf "%s-secret" (include "sqlbot.fullname" .)) }}
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: data
              mountPath: /opt/sqlbot/data
            - name: images
              mountPath: /opt/sqlbot/images
            - name: logs
              mountPath: /opt/sqlbot/app/logs
      volumes:
        - name: postgresql-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "sqlbot.fullname" . }}-postgresql
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "sqlbot.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: images
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "sqlbot.fullname" . }}-images
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: logs
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "sqlbot.fullname" . }}-logs
          {{- else }}
          emptyDir: {}
          {{- end }}
