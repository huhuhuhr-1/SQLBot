{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sqlbot.fullname" . }}-secret
  labels:
    {{- include "sqlbot.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $secret := .Values.secret }}
  POSTGRES_PASSWORD: {{ $secret.POSTGRES_PASSWORD | default "Password123@pg" | b64enc | quote }}
  {{- $sk := $secret.SECRET_KEY | toString }}
  SECRET_KEY: {{ if $sk }}{{ $sk | b64enc | quote }}{{ else }}{{ "CHANGE-ME-SECRET-KEY" | b64enc | quote }}{{ end }}
{{- end }}
