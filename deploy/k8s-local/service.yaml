apiVersion: v1
kind: Service
metadata:
  name: sqlbot
  namespace: sqlbot
  labels:
    app.kubernetes.io/name: sqlbot
spec:
  type: NodePort
  ports:
    - port: 8000
      targetPort: api
      nodePort: 30080
      protocol: TCP
      name: api
    - port: 8001
      targetPort: mcp
      nodePort: 30081
      protocol: TCP
      name: mcp
  selector:
    app.kubernetes.io/name: sqlbot
